  .float-box {
    float: right;

    height: 50px;

  .independent-box {

    background-color: limegreen;
    margin-top: 20px;
  }
</style>

<div class="float-box">오른쪽 float 박스</div>
<div class="independent-box">
  원래는 위 박스 왼쪽 빈 공간에 끼어들어야 하지만, clear: both 덕분에 아래에
  배치
</div>
