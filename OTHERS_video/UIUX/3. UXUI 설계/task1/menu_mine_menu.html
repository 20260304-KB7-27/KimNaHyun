<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>배달 앱 - 나쁜 UX</title>
    <link rel="stylesheet" href="menu-mine.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="panel">
        <h2>메뉴 선택</h2>

        <div class="section-title">치킨천국</div>
        <div class="dense-list" id="storeList">
          <div
            class="dense-item"
            data-store="치킨천국"
            data-menu="후라이드"
            data-option="콜라 추가"
          >
            <strong>후라이드</strong>
          </div>
          <div
            class="dense-item"
            data-store="피자월드"
            data-menu="페퍼로니 피자"
            data-option="치즈크러스트"
          >
            <strong>피자월드</strong>
          </div>
          <div
            class="dense-item"
            data-store="한식마을"
            data-menu="제육덮밥"
            data-option="계란 추가"
          >
            <strong>한식마을</strong>
          </div>
          <div
            class="dense-item"
            data-store="분식하우스"
            data-menu="떡볶이"
            data-option="맵기 선택"
          >
            <strong>분식하우스</strong>
            떡볶이 / 순대 / 튀김 / 세트메뉴 / 맵기선택
          </div>
          <div
            class="dense-item"
            data-store="버거팩토리"
            data-menu="치즈버거 세트"
            data-option="소스 선택"
          >
            <strong>버거팩토리</strong>
            치즈버거 / 감자세트 / 음료변경 / 소스선택
          </div>
          <div
            class="dense-item"
            data-store="디저트카페"
            data-menu="케이크"
            data-option="음료 추가"
          >
            <strong>디저트카페</strong>
            케이크 / 마카롱 / 쿠키 / 음료추가
          </div>
        </div>

        <div class="section-title">추가 옵션</div>
        <div class="option-list" id="optionList">
          <div class="option-card" data-value="기본 옵션">기본 옵션</div>
          <div class="option-card" data-value="콜라 추가">콜라 추가</div>
          <div class="option-card" data-value="치즈 추가">치즈 추가</div>
          <div class="option-card" data-value="사이즈 업">사이즈 업</div>
        </div>

        <div class="summary" id="summaryBox">
          <strong>선택 요약</strong><br />
          카테고리: 선택 안 됨<br />
          필터: 선택 안 됨<br />
          가게: 선택 안 됨<br />
          메뉴: 선택 안 됨<br />
          옵션: 선택 안 됨
        </div>
        <div class="action-box">
          <button class="btn-next" onclick="nextPage()">다음</button>
        </div>
        <div class="result-box hidden" id="resultBox"></div>
      </div>
    </div>

    <script>
      let selectedCategory = '';
      let selectedFilter = '';
      let selectedStore = '';
      let selectedMenu = '';
      let selectedOption = '';

      const summaryBox = document.getElementById('summaryBox');
      const resultBox = document.getElementById('resultBox');

      document.querySelectorAll('#categoryList .tag').forEach((tag) => {
        tag.addEventListener('click', () => {
          document.querySelectorAll('#categoryList .tag').forEach((item) => {
            item.classList.remove('selected');
          });
          tag.classList.add('selected');
          selectedCategory = tag.dataset.value;
          updateSummary();
        });
      });

      document
        .querySelectorAll('#filterList .filter-item')
        .forEach((filter) => {
          filter.addEventListener('click', () => {
            document
              .querySelectorAll('#filterList .filter-item')
              .forEach((item) => {
                item.classList.remove('selected');
              });
            filter.classList.add('selected');
            selectedFilter = filter.dataset.value;
            updateSummary();
          });
        });

      document.querySelectorAll('#storeList .dense-item').forEach((item) => {
        item.addEventListener('click', () => {
          document
            .querySelectorAll('#storeList .dense-item')
            .forEach((card) => {
              card.classList.remove('selected');
            });
          item.classList.add('selected');
          selectedStore = item.dataset.store;
          selectedMenu = item.dataset.menu;
          if (!selectedOption) {
            selectedOption = item.dataset.option;
          }
          updateSummary();
        });
      });

      document
        .querySelectorAll('#optionList .option-card')
        .forEach((option) => {
          option.addEventListener('click', () => {
            document
              .querySelectorAll('#optionList .option-card')
              .forEach((item) => {
                item.classList.remove('selected');
              });
            option.classList.add('selected');
            selectedOption = option.dataset.value;
            updateSummary();
          });
        });

      function updateSummary() {
        summaryBox.innerHTML = `
          <strong>선택 요약</strong><br />
          카테고리: ${selectedCategory || '선택 안 됨'}<br />
          필터: ${selectedFilter || '선택 안 됨'}<br />
          가게: ${selectedStore || '선택 안 됨'}<br />
          메뉴: ${selectedMenu || '선택 안 됨'}<br />
          옵션: ${selectedOption || '선택 안 됨'}
        `;
      }

      function showResult() {
        resultBox.classList.remove('hidden');
        resultBox.innerHTML = `
          <strong>주문 결과</strong><br />
          카테고리: ${selectedCategory || '선택 안 됨'}<br />
          필터: ${selectedFilter || '선택 안 됨'}<br />
          가게: ${selectedStore || '선택 안 됨'}<br />
          메뉴: ${selectedMenu || '선택 안 됨'}<br />
          옵션: ${selectedOption || '선택 안 됨'}<br /><br />
          선택은 끝까지 가능하지만, 과정이 한 화면에 섞여 있어 사용자는 계속 현재 맥락을 놓치게 됩니다.
        `;
      }

      function nextPage() {
        document.location.href = 'menu_mine_result.html';
      }
    </script>
  </body>
</html>
