<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* 
        nth-child : 가상 클래스 선택자
        - 특정 순서의 자식 요소를 선택 
        */

      .box {
        width: 100px;
        height: 100px;
        position: absolute;
        /* 픽셀기준? 다 겹침. 기준점 : 부모 요소 */
      }
      .box:nth-child(1) {
        background-color: red;
        left: 10px;
        top: 10px;
      }
      .box:nth-child(2) {
        background-color: green;
        left: 50px;
        top: 50px;
      }
      .box:nth-child(3) {
        background-color: blue;
        left: 90px;
        top: 90px;
      }
      .parent {
        width: 300px;
        height: 300px;
        background-color: aliceblue;
        position: relative; /* 이거 있을 때, 없을 때가 다름. 없으면 전체 화면 기준, 있으면 얘 기준 */
        /* static만 아니면 다른거도 가능한데 relative가 아니면 깨지는 경우가 있어서 부모를 relative로. */
      }
    </style>
    <!-- 
     absolute의 경우 
     부모 요소들 중에 position이 지정이 되어있을 경우 해당 부모를 기준으로 
     top. right, bottom, left 속성을 사용하여 위치를 지정
      -->
  </head>
  <body>
    <h1>테스트</h1>
    <div class="parent">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
  </body>
</html>
