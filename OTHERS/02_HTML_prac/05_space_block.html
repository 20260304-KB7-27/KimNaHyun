<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 
    block
    - 줄바꿈이 일어남
    - 너비와 높이 설정이 가능
    - 기본적으로 부모 요소의 전체 너비를 차지
    - 여백, 패딩 (margin / padding) 설정 가능

    <div>
    <p>
    <ul>, <ol>
    <form>
    <header>, <footer>  딱히 동작을 하진 않지만 구분을 위해 이름 붙여 씀. 검색엔진 최적화 위함.
      -->

    <div>첫번째 div는 새로운 줄에서 시작됨</div>
    <div style="background-color: black">
      두번째 div는 자동으로 줄바꿈이 됨.
    </div>
    <div style="width: 200px; height: 50px; background-color: yellow">
      너비와 높이가 지정된 div
    </div>

    <div style="display: flex">
      <p>dsdfs</p>
      <p>ddsf</p>
    </div>
  </body>
