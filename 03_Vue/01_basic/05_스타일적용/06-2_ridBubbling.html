<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <div>
        <div @mouseover="parentOverEvent" @mouseout="parentOutEvent">
        <button :style="style1" @mouseover.stop="overEvent" @mouseout="outEvent">
          테스트
        </button>
      </div>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const style1 = ref({
            backgroundColor: 'aqua',
            color: 'black',
          });

          const parentOverEvent = ()=>{
            console.log(`parent Over Event`);
            
          }

          const parentOutEvent = ()=>{
            console.log(`parent Out Event`);
            
          }

          const overEvent = () => {
            // 스타일 변경
            style1.value.backgroundColor = 'purple';
            style1.value.color = 'yellow';
          };
          const outEvent = (e) => {
            // 스타일 변경
            style1.value.backgroundColor = 'aqua';
            style1.value.color = 'black';

            e.stopPropagation();  // 이벤트 전파 막기
            
          };

          return {
            style1,
            overEvent,
            outEvent,
            parentOverEvent,
            parentOutEvent
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
