<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script스니펫</title>
    <!-- font-awsome 라이브러리 가져오기 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <!-- Bootstrap CSS 디자인, 레이아웃 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
    />

    <!-- Bootstrap JS 모달, 드롭다운 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <div id="app" class="m-3">
      <h1>Bootstrap Table</h1>
      <table class="table table-striped table-hover">
        <thead>
          <tr>
            <th>No</th>
            <th>제목</th>
            <th>작성자</th>
            <th>등록일</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="(item, index) in tableData" :key="item.no">
            <td>{{item.no}}</td>
            <td><a href="#">{{item.title}}</a></td>
            <td>{{item.user}}</td>
            <td>{{item.date}}</td>
          </tr>
        </tbody>
      </table>
      <br />

      <h1><i class="fa-solid fa-home"></i> Fontawesome 테스트</h1>
      <div class="d-flex gap-1">
        <button class="btn btn-primary">
          <i class="fa-solid fa-envelope"></i> email
        </button>
        <button class="btn btn-success">
          <i class="fa-solid fa-right-to-bracket"></i> login
        </button>
        <button class="btn btn-warning">
          <i class="fa-solid fa-lock"></i> 비밀번호
        </button>
        <button class="btn btn-danger">
          <i class="fa-solid fa-trash"></i> 삭제
        </button>
      </div>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      const { createApp } = Vue;
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            tableData: [
              { no: 1, title: '글 제목 1', user: 'user01', date: '2024-04-17' },
              { no: 2, title: '글 제목 2', user: 'user01', date: '2024-04-17' },
              { no: 3, title: '글 제목 3', user: 'user01', date: '2024-04-17' },
              { no: 4, title: '글 제목 4', user: 'user01', date: '2024-04-17' },
            ],
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
