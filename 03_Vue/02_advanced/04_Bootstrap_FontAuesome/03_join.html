<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script스니펫</title>
    <!-- font-awsome 라이브러리 가져오기 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <!-- Bootstrap CSS 디자인, 레이아웃 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
    />

    <!-- Bootstrap JS 모달, 드롭다운 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="my-4 mx-5">
      <h1><i class="fa-solid fa-user-plus"></i> 회원 가입</h1>
      <br />

      <div class="mb-3 mt-3">
        <label for="id"><i class="fa-solid fa-user"></i> 사용자 ID: </label>
        <input type="text" class="form-control" id="id" name="id" />
      </div>
      <div class="mb-3 mt-3">
        <label for="password"
          ><i class="fa-solid fa-lock"></i> 비밀번호:
        </label>
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
        />
      </div>
      <div class="mb-3 mt-3">
        <label for="confirm"
          ><i class="fa-solid fa-lock"></i> 비밀번호 확인:
        </label>
        <input
          type="password"
          class="form-control"
          id="confirm"
          name="confirm"
        />
      </div>
      <div class="mb-3 mt-3">
        <label for="email"
          ><i class="fa-regular fa-envelope"></i> email:
        </label>
        <input type="email" class="form-control" id="email" name="email" />
      </div>
      <div class="mb-3 mt-3">
        <label for="email"
          ><i class="fa-solid fa-user-astronaut"></i> 아바타 이미지
        </label>
        <input type="file" class="form-control" id="avatar" name="avatar" />
      </div>

      <div class="text-center">
        <button type="submit" class="btn btn-primary">
          <i class="fa-solid fa-user-plus"></i> 회원 가입
        </button>
      </div>
    </div>
  </body>
</html>
