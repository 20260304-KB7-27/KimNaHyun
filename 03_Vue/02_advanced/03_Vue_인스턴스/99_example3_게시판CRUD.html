<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 게시판 목록</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>📌 게시판 목록 v2</h1>
      <div>
        <input type="text" v-model="newPost.title" />
        <input type="text" v-model="newPost.content" />
        <button @click="addPost()">추가</button>
      </div>
      <ul v-for="post in posts" :key="post.no">
        <li>
          <div class="post-item" @click="selectPost(post)">
            {{post.no}}. {{post.title}}
            <span class="arrow" v-if="selectedPosts.includes(post)">▲</span
            ><span class="arrow" v-else>▼</span>
          </div>

          <div class="post-content" v-if="selectedPosts.includes(post)">
            <div v-if="post.no !== editingPost.no">
              <h3>{{post.title}}</h3>
              <p>{{post.content}}</p>
              <button @click="startEdit(post)">수정</button>
              <button @click="deletePost(post.no)">삭제</button>
              <button @click="selectPost(post)">닫기</button>
            </div>
            <div v-else class="post-edit">
              <input type="text" v-model="editingPost.title" />
              <textarea v-model="editingPost.content"></textarea>
              <button @click="saveEdit()">수정</button>
              <button @click="cancelEdit()">취소</button>
            </div>
          </div>
        </li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          let ts = new Date().getTime();
          const posts = ref([
            {
              no: 1,
              title: 'Vue.js 기초 배우기',
              content:
                'Vue.js는 사용자 인터페이스를 구축하기 위한 프로그레시브 프레임워크입니다.',
            },
            {
              no: 2,
              title: '자바스크립트 ES6 문법',
              content:
                'ES6는 JavaScript의 최신 문법을 포함하며, let/const, 화살표 함수, 구조 분해 할당 등을 제공합니다.',
            },
            {
              no: 3,
              title: 'Node.js와 Express',
              content:
                'Node.js는 서버 측에서 JavaScript를 실행할 수 있도록 하는 런타임이며, Express는 이를 위한 경량 웹 프레임워크입니다.',
            },
            {
              no: 4,
              title: 'MongoDB 기본 개념',
              content:
                'MongoDB는 NoSQL 데이터베이스로 JSON과 유사한 문서 기반 데이터를 저장하고 관리할 수 있습니다.',
            },
            {
              no: 5,
              title: '프론트엔드와 백엔드의 차이',
              content:
                '프론트엔드는 사용자가 보는 부분을 개발하는 것이고, 백엔드는 서버와 데이터베이스를 관리하는 부분입니다.',
            },
            {
              no: 6,
              title: '비동기 프로그래밍',
              content:
                'JavaScript의 비동기 처리 방식에는 콜백, 프로미스, async/await가 있습니다.',
            },
            {
              no: 7,
              title: 'Vue Router 사용법',
              content:
                'Vue Router를 사용하면 Vue.js 애플리케이션에서 페이지 이동을 쉽게 처리할 수 있습니다.',
            },
            {
              no: 8,
              title: '컴포넌트 기반 개발',
              content:
                'Vue.js에서는 컴포넌트를 사용하여 UI를 작은 단위로 쪼개서 관리할 수 있습니다.',
            },
            {
              no: 9,
              title: 'CSS와 SCSS 차이점',
              content:
                'SCSS는 CSS의 확장된 버전으로 변수, 중첩, 믹스인 등을 지원합니다.',
            },
            {
              no: 10,
              title: 'Git과 GitHub 사용법',
              content:
                'Git은 버전 관리 시스템이며, GitHub는 이를 활용한 원격 저장소 플랫폼입니다.',
            },
          ]);

          const selectedPosts = ref([]);

          function selectPost(post) {
            if (!selectedPosts.value.includes(post)) {
              selectedPosts.value.push(post);
            } else {
              selectedPosts.value = selectedPosts.value.filter(
                (p) => p.no !== post.no,
              );
            }
            console.log(selectedPosts);
          }

          const nextNo = ref(11);
          const newPost = ref({
            title: null,
            content: null,
          });

          function addPost() {
            if (!newPost.value.title || !newPost.value.content) {
              alert('제목과 내용은 빈칸일 수 없습니다.');
              return;
            }

            posts.value.push({
              no: nextNo.value,
              ...newPost.value,
            });

            nextNo.value++;
            newPost.value.title = null;
            newPost.value.content = null;
          }

          function deletePost(no) {
            posts.value = posts.value.filter((p) => p.no !== no);
            selectedPosts.value = selectedPosts.value.filter(
              (p) => p.no !== no,
            );
          }

          const editingPost = ref({
            no: null,
            title: null,
            content: null,
          });

          function startEdit(post) {
            editingPost.value = { ...post };
          }

          function saveEdit() {
            if (!editingPost.value.title || !editingPost.value.content) {
              alert('내용을 입력해주세요.');
              return;
            }

            const index = posts.value.findIndex(
              (p) => p.no === editingPost.value.no,
            );

            if (index !== -1) {
              posts.value[index] = { ...editingPost.value };
              const sIndex = selectedPosts.value.findIndex(
                (p) => p.no === editingPost.value.no,
              );
              if (sIndex !== -1) {
                selectedPosts.value[sIndex] = { ...editingPost.value };
              }
            }
            cancelEdit();
          }

          function cancelEdit() {
            editingPost.value = {
              no: null,
              title: null,
              content: null,
            };
          }

          return {
            posts,
            selectedPosts,
            selectPost,
            newPost,
            addPost,
            deletePost,
            editingPost,
            startEdit,
            saveEdit,
            cancelEdit,
          };
        },
      }).mount('#app');
    </script>

    <style>
      h1 {
        text-align: center;
        color: #333;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }
      .post-item {
        cursor: pointer;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
      }
      .post-item:hover {
        background: #f4f4f4;
      }
      .post-content {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
        background: #fff;
      }
      .post-edit input {
        display: block;
        width: 100%;
        margin: 0px auto;
      }
      .post-edit textarea {
        display: block;
        width: 100%;
        margin: 0px auto;
        min-height: 100px;
      }
      button {
        margin-top: 10px;
        padding: 5px 10px;
        border: none;
        background: #ff6b6b;
        color: white;
        cursor: pointer;
        border-radius: 3px;
      }
      button:hover {
        background: #ff4f4f;
      }

      .arrow {
        font-size: 0.8em;
        color: #888;
      }
    </style>
  </body>
</html>

<!-- 아래에 박스
 
@click="selectPost()"
일 때 post를 인자로 전달 할 수 있음.

selectPost(post)
=> post 정보 받아서 처리 가능
-->
